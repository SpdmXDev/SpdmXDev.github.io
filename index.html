<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATWI Obfuscator</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #111827;
            --text-color: #f3f4f6;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --border-color: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .obfuscator-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .description {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            background-color: #070a12;
            color: #34d399;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ffffff;
        }

        #btnEnter {
            background-color: var(--accent-color);
        }

        #btnEnter:hover {
            background-color: var(--accent-hover);
        }

        #btnCopy {
            background-color: #4b5563;
        }

        #btnCopy:hover {
            background-color: #374151;
        }

        .notification {
            text-align: center;
            color: var(--success-color);
            margin-top: 10px;
            font-size: 0.9rem;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div class="obfuscator-container">
    <h1>ATWI Obfuscator</h1>
    <div class="description">Paste your Luau / Lua script below and press Enter to obfuscate</div>
    
    <textarea id="scriptBox" placeholder="Paste your script here..."></textarea>
    
    <div class="button-group">
        <button id="btnEnter">Enter (Obfuscate)</button>
        <button id="btnCopy">Copy (Copy Code)</button>
    </div>
    
    <div id="copyNotification" class="notification">Obfuscated script copied to clipboard successfully!</div>
</div>

<script>
    // Custom ASCII banner requested for the top of the obfuscation
    const atwiBanner = `--[[ \n\n  _______  __              __ \n |   _   ||  |_ .--.--.--.|__|\n |       ||   _||  |  |  ||  |\n |___|___||____||________||__|\n                              \n\n  _______  __      ___                             __                \n |       ||  |--..'  _|.--.--..-----..----..---.-.|  |_ .-----..----.\n |   -   ||  _  ||   _||  |  ||__ --||  __||  _  ||   _||  _  ||   _|\n |_______||_____||__|  |_____||_____||____||___._||____||_____||__|  \n                                                                     \n                     ByteCode by http://spdmxdev.github.io\n\n]]--\n\n`;

    // Helper to generate random string names to prevent static analysis (Deobfuscation)
    function makeId(length) {
        let result = '';
        const characters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
        for (let i = 0; i < length; i++) {
            result += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        return "_" + result;
    }

    const scriptBox = document.getElementById('scriptBox');
    const btnEnter = document.getElementById('btnEnter');
    const btnCopy = document.getElementById('btnCopy');
    const notification = document.getElementById('copyNotification');

    btnEnter.addEventListener('click', () => {
        const rawCode = scriptBox.value;
        
        if (!rawCode.trim()) {
            alert('Please paste a script first before obfuscating!');
            return;
        }

        // 1. Heavy Bytecode Obfuscation + XOR Encryption Engine
        const xorKey = Math.floor(Math.random() * 200) + 35; 
        let hexBytecode = "";

        for (let i = 0; i < rawCode.length; i++) {
            // Apply XOR operation to each character byte
            let encryptedByte = rawCode.charCodeAt(i) ^ xorKey;
            // Convert to Hexadecimal format (\xXX)
            let hex = encryptedByte.toString(16).toUpperCase();
            if (hex.length < 2) hex = "0" + hex;
            hexBytecode += "\\" + "x" + hex;
        }

        // 2. Generate Random Virtual Machine Variable Names (Anti-Decompile)
        const vm_call = makeId(8);
        const bytecode_str = makeId(8);
        const key_num = makeId(8);
        const un-xor_func = makeId(8);
        const result_table = makeId(8);
        const stream_pos = makeId(8);
        const current_char = makeId(8);

        // 3. Assemble the Advanced Virtualized Runtime Script
        const obfuscatedResult = atwiBanner + 
`local ${vm_call} = function(${bytecode_str}, ${key_num})
    local ${result_table} = {}
    local ${un-xor_func} = string.gsub(${bytecode_str}, ".", function(${current_char})
        return string.char(string.byte(${current_char}) ~ ${key_num})
    end)
    return (loadstring or load)(${un-xor_func})
end
return ${vm_call}("${hexBytecode}", ${xorKey})(...);`;

        // Output the fully secured, randomized script into the box
        scriptBox.value = obfuscatedResult;
    });

    // Copy to clipboard function
    btnCopy.addEventListener('click', () => {
        if (!scriptBox.value.trim()) {
            alert('There is no text to copy!');
            return;
        }

        scriptBox.select();
        scriptBox.setSelectionRange(0, 99999);

        navigator.clipboard.writeText(scriptBox.value).then(() => {
            notification.style.opacity = '1';
            setTimeout(() => {
                notification.style.opacity = '0';
            }, 2000);
        }).catch(err => {
            alert('Copy failed. Please select and copy manually.');
        });
    });
</script>

</body>
</html>
