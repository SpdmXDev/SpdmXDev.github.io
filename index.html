<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Executors Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 25px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .header h1 {
            color: #1e3c72;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .apps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .app-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }
        
        .app-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.4);
        }
        
        .app-card:active {
            transform: translateY(-5px);
        }
        
        .app-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .app-name {
            color: white;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .download-btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .download-btn:active {
            transform: scale(0.98);
        }
        
        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 30px;
        }
        
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #856404;
            font-size: 13px;
            line-height: 1.6;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .apps-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Android Executors</h1>
            <p>Download the latest executor apps for Roblox</p>
        </div>
        
        <div class="warning">
            ⚠️ <strong>Important:</strong> Make sure to enable "Unknown Sources" in your Android settings before installing these APK files.
        </div>
        
        <div class="apps-grid">
            <!-- Arceus X Card -->
            <div class="app-card">
                <div class="app-icon">⚡</div>
                <div class="app-name">Arceus X Android</div>
                <a href="https://github.com/SPDMTiahh/Updates/releases/download/2.1.8/Roblox.Arceus.X.NEO.2.1.8.apk" download class="download-btn">Download</a>
            </div>
            
            <!-- Delta Executor Card -->
            <div class="app-card">
                <div class="app-icon">⚙️</div>
                <div class="app-name">Delta Executor Android</div>
                <a href="https://delta.filenetwork.vip/file/Delta-2.718.1110-02.apk" download class="download-btn">Download</a>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 Android Executors Hub. All rights reserved.</p>
        </div>
    </div>
</body>
  </html>
