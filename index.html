<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atwi Obf Security</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f1e;
            color: #00d4ff;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-size: 18px;
            text-align: center;
        }
        
        .container {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        Atwi Obf Security
    </div>

    <script>
        // Check if accessed from Roblox executor
        function isRobloxExecutor() {
            return typeof game !== 'undefined' && game && game.Players;
        }

        // Get content based on access method
        function getContent() {
            if (isRobloxExecutor()) {
                return `-- Atwi Obf Security
-- Script Protection System

local p = game.Players.LocalPlayer
if p.Backpack:FindFirstChild("ANTIXPLOIT") then
    p.Backpack.ANTIXPLOIT:Remove()
end

loadstring(game:HttpGet("https://raw.githubusercontent.com/SpdmXDev/AtwiPremiumLevel8/main/AtwiPremium8.txt"))()`;
            } else {
                return "Atwi Obf Security";
            }
        }

        // Display content
        document.getElementById('content').textContent = getContent();

        // If it's Roblox executor, also format as code
        if (isRobloxExecutor()) {
            document.getElementById('content').style.whiteSpace = 'pre-wrap';
            document.getElementById('content').style.textAlign = 'left';
            document.getElementById('content').style.backgroundColor = '#1a1a2e';
            document.getElementById('content').style.padding = '30px';
            document.getElementById('content').style.borderRadius = '10px';
            document.getElementById('content').style.border = '1px solid #00d4ff';
            document.getElementById('content').style.fontFamily = 'Courier New, monospace';
            document.getElementById('content').style.fontSize = '14px';
            document.getElementById('content').style.color = '#00ff88';
            document.getElementById('content').style.overflow = 'auto';
            document.getElementById('content').style.maxWidth = '600px';
        }
    </script>
</body>
</html>
