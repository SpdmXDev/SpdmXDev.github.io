<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATWI Obfuscator</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #111827;
            --text-color: #f3f4f6;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --border-color: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .obfuscator-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .description {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            background-color: #070a12;
            color: #34d399;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ffffff;
        }

        #btnEnter {
            background-color: var(--accent-color);
        }

        #btnEnter:hover {
            background-color: var(--accent-hover);
        }

        #btnCopy {
            background-color: #4b5563;
        }

        #btnCopy:hover {
            background-color: #374151;
        }

        .notification {
            text-align: center;
            color: var(--success-color);
            margin-top: 10px;
            font-size: 0.9rem;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div class="obfuscator-container">
    <h1>ATWI Obfuscator</h1>
    <div class="description">Paste your Luau / Lua script below and press Enter to obfuscate</div>
    
    <textarea id="scriptBox" placeholder="Paste your script here..."></textarea>
    
    <div class="button-group">
        <button id="btnEnter">Enter (Obfuscate)</button>
        <button id="btnCopy">Copy (Copy Code)</button>
    </div>
    
    <div id="copyNotification" class="notification">Obfuscated script copied to clipboard successfully!</div>
</div>

<script>
    // The requested ASCII banner to be placed at the top of every obfuscation
    const atwiBanner = `--[[ \n\n  _______  __              __ \n |   _   ||  |_ .--.--.--.|__|\n |       ||   _||  |  |  ||  |\n |___|___||____||________||__|\n                              \n\n  _______  __      ___                             __                \n |       ||  |--..'  _|.--.--..-----..----..---.-.|  |_ .-----..----.\n |   -   ||  _  ||   _||  |  ||__ --||  __||  _  ||   _||  _  ||   _|\n |_______||_____||__|  |_____||_____||____||___._||____||_____||__|  \n                                                                     \n                     v1.0.0 http://spdmxdev.github.io\n\n]]--\n\n`;

    const scriptBox = document.getElementById('scriptBox');
    const btnEnter = document.getElementById('btnEnter');
    const btnCopy = document.getElementById('btnCopy');
    const notification = document.getElementById('copyNotification');

    // Encryption logic when 'Enter' is clicked
    btnEnter.addEventListener('click', () => {
        const rawCode = scriptBox.value;
        
        if (!rawCode.trim()) {
            alert('Please paste a script first before obfuscating!');
            return;
        }

        // Generate a random dynamic key so the output layout changes on every click
        const encryptionKey = Math.floor(Math.random() * 80) + 20;
        const encryptedBytes = [];

        // Dynamic Char-shifting algorithm
        for (let i = 0; i < rawCode.length; i++) {
            encryptedBytes.push(rawCode.charCodeAt(i) + encryptionKey);
        }

        // Pack the encrypted bytes into a dynamic runtime Virtual Machine loader string
        const obfuscatedResult = atwiBanner + 
`local _atwi_env = getfenv or function() return _ENV end
local _string_char = string.char
local _table_concat = table.concat
local _load_string = loadstring or load
local _key = ${encryptionKey}
local _bytecode = {${encryptedBytes.join(', ')}}
local _output = {}

for _idx = 1, #_bytecode do 
    _output[_idx] = _string_char(_bytecode[_idx] - _key) 
end

return _load_string(_table_concat(_output))(...);`;

        // Update the text box with the new scrambled format
        scriptBox.value = obfuscatedResult;
    });

    // Copy to clipboard functionality
    btnCopy.addEventListener('click', () => {
        if (!scriptBox.value.trim()) {
            alert('There is no text to copy!');
            return;
        }

        scriptBox.select();
        scriptBox.setSelectionRange(0, 99999); // For mobile device compatibility

        navigator.clipboard.writeText(scriptBox.value).then(() => {
            // Visual feedback popup
            notification.style.opacity = '1';
            setTimeout(() => {
                notification.style.opacity = '0';
            }, 2000);
        }).catch(err => {
            alert('Automatic copy failed. Please select and copy manually.');
        });
    });
</script>

</body>
</html>
